<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Upper wing -->
  <path d="M 27,5 L 7,4 L 22,16 Z"
        fill="white" stroke="#A78BFA" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Lower fold -->
  <path d="M 27,5 L 22,16 L 11,25 Z"
        fill="#C4B5FD" opacity="0.7" stroke="#A78BFA" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Rear flap -->
  <path d="M 7,4 L 22,16 L 11,25 Z"
        fill="#7C3AED" opacity="0.5" stroke="#A78BFA" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Fold crease -->
  <line x1="27" y1="5" x2="22" y2="16"
        stroke="#C4B5FD" stroke-width="0.9" opacity="0.9"/>
</svg>

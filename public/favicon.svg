<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Upper wing -->
  <path d="M 28,5 L 4,12 L 18,19 Z"
        fill="white" stroke="#A78BFA" stroke-width="1" stroke-linejoin="round"/>
  <!-- Lower fold -->
  <path d="M 28,5 L 18,19 L 8,26 Z"
        fill="#EDE9FE" stroke="#A78BFA" stroke-width="1" stroke-linejoin="round"/>
  <!-- Rear flap -->
  <path d="M 4,12 L 18,19 L 8,26 Z"
        fill="#C4B5FD" stroke="#A78BFA" stroke-width="1" stroke-linejoin="round"/>
  <!-- Fold crease -->
  <line x1="28" y1="5" x2="18" y2="19" stroke="#A78BFA" stroke-width="0.7" opacity="0.6"/>
</svg>

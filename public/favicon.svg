<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Upper wing -->
  <path d="M 27,4 L 3,15 L 17,18 Z"
        fill="white" stroke="#A78BFA" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Lower fold -->
  <path d="M 27,4 L 17,18 L 9,27 Z"
        fill="#DDD6FE" stroke="#A78BFA" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Rear flap -->
  <path d="M 3,15 L 17,18 L 9,27 Z"
        fill="#A78BFA" opacity="0.55" stroke="#A78BFA" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Fold crease -->
  <line x1="27" y1="4" x2="17" y2="18"
        stroke="#C4B5FD" stroke-width="0.8" opacity="0.8"/>
</svg>

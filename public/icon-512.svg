<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="60%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Dense diagonal hatch scaled for 512 -->
    <pattern id="hatch" width="13" height="13"
             patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="13"
            stroke="#A78BFA" stroke-width="2.5" opacity="0.65"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#1E0048" flood-opacity="0.45"/>
    </filter>
    <clipPath id="clip">
      <rect width="512" height="512" rx="114"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <rect width="512" height="256" rx="114" fill="url(#shine)"/>

  <g clip-path="url(#clip)">
    <!-- Plane — vertices scaled 16× from 32×32 design:
         N=(432,64)  TL=(128,160)  B=(320,272)  T=(208,352) -->
    <g filter="url(#shadow)">
      <!-- Upper wing (white) -->
      <path d="M 432,64 L 128,160 L 320,272 Z"
            fill="white" stroke="#A78BFA" stroke-width="9" stroke-linejoin="round"/>
      <!-- Lower fold (light lavender base) -->
      <path d="M 432,64 L 320,272 L 208,352 Z"
            fill="#EDE9FE" stroke="#A78BFA" stroke-width="9" stroke-linejoin="round"/>
      <!-- Rear flap -->
      <path d="M 128,160 L 320,272 L 208,352 Z"
            fill="#C4B5FD" stroke="#A78BFA" stroke-width="9" stroke-linejoin="round"/>
    </g>
    <!-- Hatch overlay on lower fold only -->
    <path d="M 432,64 L 320,272 L 208,352 Z" fill="url(#hatch)"/>
    <!-- Fold crease line -->
    <line x1="432" y1="64" x2="320" y2="272"
          stroke="#A78BFA" stroke-width="5" opacity="0.65"/>

    <!-- Dashed trail with loop — scaled ~2.67× from 192 trail -->
    <path d="M 214,347
             C 192,363 166,357 147,376
             C 128,395 96,395 91,419
             C 86,443 101,462 126,456
             C 151,450 158,427 141,411
             C 124,395 101,400 91,419
             C 81,438 59,459 27,470"
          stroke="#A78BFA" stroke-width="7.5" stroke-dasharray="16,18"
          fill="none" opacity="0.6" stroke-linecap="round"/>
  </g>
</svg>

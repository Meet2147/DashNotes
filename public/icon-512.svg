<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="60%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1E0048" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <!-- Top shine -->
  <rect width="512" height="256" rx="114" fill="url(#shine)"/>

  <!-- Paper plane (scaled 16x from 32x32: nose→448,208 top→48,48 fold→144,208 bottom→48,368) -->
  <g filter="url(#shadow)">
    <!-- Top wing -->
    <path d="M 448,208 L 48,48 L 144,208 Z" fill="white"/>
    <!-- Bottom wing (slightly dimmer) -->
    <path d="M 448,208 L 144,208 L 48,368 Z" fill="white" opacity="0.88"/>
    <!-- Lower fold flap -->
    <path d="M 144,208 L 176,304 L 48,368 Z" fill="#C4B5FD" opacity="0.75"/>
  </g>

  <!-- Accent sparkle trail -->
  <g filter="url(#glow)">
    <circle cx="390" cy="336" r="12"  fill="#A78BFA" opacity="0.55"/>
    <circle cx="426" cy="374" r="8"   fill="#C4B5FD" opacity="0.40"/>
    <circle cx="356" cy="392" r="6"   fill="#DDD6FE" opacity="0.30"/>
  </g>
</svg>

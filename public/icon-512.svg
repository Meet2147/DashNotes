<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="60%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Diagonal hatch pattern scaled for 512 (same visual density as 192) -->
    <pattern id="hatch" width="27" height="27"
             patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="27"
            stroke="#A78BFA" stroke-width="3.5" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#1E0048" flood-opacity="0.45"/>
    </filter>
    <!-- Clip to rounded background shape -->
    <clipPath id="clip">
      <rect width="512" height="512" rx="114"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <rect width="512" height="256" rx="114" fill="url(#shine)"/>

  <!-- Plane + trail clipped to rounded rect -->
  <g clip-path="url(#clip)">

    <!-- Plane with drop shadow -->
    <g filter="url(#shadow)">
      <!-- Upper wing -->
      <path d="M 432,80 L 64,208 L 256,320 Z"
            fill="white" stroke="#A78BFA" stroke-width="7" stroke-linejoin="round"/>
      <!-- Lower fold base -->
      <path d="M 432,80 L 256,320 L 112,432 Z"
            fill="#DDD6FE" stroke="#A78BFA" stroke-width="7" stroke-linejoin="round"/>
      <!-- Rear flap -->
      <path d="M 64,208 L 256,320 L 112,432 Z"
            fill="#C4B5FD" opacity="0.85" stroke="#A78BFA" stroke-width="7" stroke-linejoin="round"/>
    </g>

    <!-- Hatch overlay on lower fold -->
    <path d="M 432,80 L 256,320 L 112,432 Z" fill="url(#hatch)" opacity="0.55"/>

    <!-- Dashed flight trail -->
    <path d="M 112,418 Q 50,456 70,490 Q 90,512 40,508"
          stroke="#A78BFA" stroke-width="7" stroke-dasharray="13,16"
          fill="none" opacity="0.45" stroke-linecap="round"/>
  </g>
</svg>

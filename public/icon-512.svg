<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="60%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Dense hatch scaled for 512 (same visual density as 192) -->
    <pattern id="hatch" width="13" height="13"
             patternUnits="userSpaceOnUse" patternTransform="rotate(-50)">
      <line x1="0" y1="0" x2="0" y2="13"
            stroke="#A78BFA" stroke-width="3" opacity="0.7"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20"
                    flood-color="#1E0048" flood-opacity="0.45"/>
    </filter>
    <clipPath id="clip">
      <rect width="512" height="512" rx="114"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <rect width="512" height="256" rx="114" fill="url(#shine)"/>

  <g clip-path="url(#clip)">
    <!--
      Plane vertices scaled 16× from 32×32:
        N  = (432,  80)  nose
        UL = (112,  64)  upper-left tip
        FJ = (352, 256)  fold junction
        BL = (176, 400)  tail
    -->
    <g filter="url(#shadow)">
      <!-- Upper wing -->
      <path d="M 432,80 L 112,64 L 352,256 Z"
            fill="white" stroke="#A78BFA" stroke-width="9" stroke-linejoin="round"/>
      <!-- Lower fold base -->
      <path d="M 432,80 L 352,256 L 176,400 Z"
            fill="#C4B5FD" opacity="0.6" stroke="#A78BFA" stroke-width="9" stroke-linejoin="round"/>
      <!-- Rear flap -->
      <path d="M 112,64 L 352,256 L 176,400 Z"
            fill="#7C3AED" opacity="0.45" stroke="#A78BFA" stroke-width="9" stroke-linejoin="round"/>
    </g>

    <!-- Dense diagonal hatch over lower fold -->
    <path d="M 432,80 L 352,256 L 176,400 Z" fill="url(#hatch)"/>

    <!-- Fold crease line -->
    <line x1="432" y1="80" x2="352" y2="256"
          stroke="#C4B5FD" stroke-width="6.5" opacity="0.9"/>

    <!--
      Dashed loop trail scaled ~2.67× from 192 trail.
    -->
    <path d="M 182,389
             C 160,411 139,416 123,435
             C 107,454 80,454 75,475
             C 70,496 85,512 107,507
             C 129,502 139,480 128,459
             C 117,438 91,438 75,459
             C 59,480 37,491 11,496"
          stroke="#A78BFA" stroke-width="7.5" stroke-dasharray="16,18"
          fill="none" opacity="0.65" stroke-linecap="round"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="60%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Hatch lines scaled for 512 (same visual density as 192) -->
    <pattern id="hatch" width="16" height="16"
             patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="16" stroke="#A78BFA" stroke-width="2.5" opacity="0.55"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#1E0048" flood-opacity="0.45"/>
    </filter>
    <clipPath id="clip">
      <rect width="512" height="512" rx="114"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <rect width="512" height="256" rx="114" fill="url(#shine)"/>

  <g clip-path="url(#clip)">
    <g filter="url(#shadow)">
      <!-- Upper wing (white, large face) — scaled 16× from 32×32 -->
      <path d="M 448,80 L 64,192 L 288,304 Z"
            fill="white" stroke="#A78BFA" stroke-width="8" stroke-linejoin="round"/>
      <!-- Lower fold base fill -->
      <path d="M 448,80 L 288,304 L 128,416 Z"
            fill="#EDE9FE" stroke="#A78BFA" stroke-width="8" stroke-linejoin="round"/>
      <!-- Rear flap -->
      <path d="M 64,192 L 288,304 L 128,416 Z"
            fill="#C4B5FD" stroke="#A78BFA" stroke-width="8" stroke-linejoin="round"/>
    </g>

    <!-- Hatch overlay on lower fold only -->
    <path d="M 448,80 L 288,304 L 128,416 Z" fill="url(#hatch)" opacity="0.7"/>

    <!-- Fold crease line (nose → fold junction) -->
    <line x1="448" y1="80" x2="288" y2="304"
          stroke="#A78BFA" stroke-width="5" opacity="0.55"/>

    <!-- Dashed trail: sweeps from tail, loops, exits lower-left — scaled 16× from 192 trail -->
    <path d="M 134,406
             C 112,426 96,426 85,448
             C 74,469 85,496 107,485
             C 128,474 117,445 96,450
             C 75,455 53,482 26,490"
          stroke="#A78BFA" stroke-width="7" stroke-dasharray="16,18"
          fill="none" opacity="0.55" stroke-linecap="round"/>
  </g>
</svg>

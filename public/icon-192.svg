<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="60%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1E0048" flood-opacity="0.4"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="44" fill="url(#bg)"/>
  <!-- Top shine -->
  <rect width="192" height="96" rx="44" fill="url(#shine)"/>

  <!-- Document / page -->
  <g filter="url(#shadow)">
    <!-- Page body -->
    <path d="M 55,36 L 117,36 L 117,36 L 139,58 L 139,158
             Q 139,162 135,162 L 57,162 Q 53,162 53,158 L 53,40 Q 53,36 57,36 Z"
          fill="white"/>
    <!-- Folded corner -->
    <path d="M 117,36 L 139,58 L 117,58 Z" fill="#C4B5FD"/>
    <!-- Corner fold shadow -->
    <path d="M 117,58 L 139,58 L 117,36 Z" fill="#8B5CF6" opacity="0.3"/>
  </g>

  <!-- Note lines on page -->
  <rect x="67" y="76"  width="58" height="7" rx="3.5" fill="#7C3AED" opacity="0.18"/>
  <rect x="67" y="93"  width="48" height="7" rx="3.5" fill="#7C3AED" opacity="0.14"/>
  <rect x="67" y="110" width="54" height="7" rx="3.5" fill="#7C3AED" opacity="0.14"/>
  <rect x="67" y="127" width="40" height="7" rx="3.5" fill="#7C3AED" opacity="0.10"/>

  <!-- Aria AI sparkle — 4-pointed star in cyan -->
  <g filter="url(#glow)" transform="translate(117,137)">
    <!-- Outer glow -->
    <circle r="17" fill="#06B6D4" opacity="0.15"/>
    <!-- 4-pointed star -->
    <path d="M0,-14 C2,-4 4,-2 14,0 C4,2 2,4 0,14 C-2,4 -4,2 -14,0 C-4,-2 -2,-4 0,-14 Z"
          fill="#22D3EE"/>
    <!-- Center dot -->
    <circle r="2.5" fill="white"/>
  </g>

  <!-- Small accent dots -->
  <circle cx="143" cy="123" r="3"   fill="#67E8F9" opacity="0.7"/>
  <circle cx="109" cy="151" r="2.5" fill="#A5F3FC" opacity="0.5"/>
  <circle cx="149" cy="147" r="2"   fill="#67E8F9" opacity="0.4"/>
</svg>

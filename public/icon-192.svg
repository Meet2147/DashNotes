<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="60%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Dense close diagonal hatch (matches reference hatching) -->
    <pattern id="hatch" width="5" height="5"
             patternUnits="userSpaceOnUse" patternTransform="rotate(-50)">
      <line x1="0" y1="0" x2="0" y2="5"
            stroke="#A78BFA" stroke-width="1.1" opacity="0.7"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7"
                    flood-color="#1E0048" flood-opacity="0.4"/>
    </filter>
    <clipPath id="clip">
      <rect width="192" height="192" rx="44"/>
    </clipPath>
  </defs>

  <rect width="192" height="192" rx="44" fill="url(#bg)"/>
  <rect width="192" height="96"  rx="44" fill="url(#shine)"/>

  <g clip-path="url(#clip)">
    <!--
      Plane vertices scaled 6× from 32×32:
        N  = (162, 30)   nose
        UL = ( 42, 24)   upper-left tip
        FJ = (132, 96)   fold junction
        BL = ( 66,150)   tail
    -->
    <g filter="url(#shadow)">
      <!-- Upper wing -->
      <path d="M 162,30 L 42,24 L 132,96 Z"
            fill="white" stroke="#A78BFA" stroke-width="3.5" stroke-linejoin="round"/>
      <!-- Lower fold base -->
      <path d="M 162,30 L 132,96 L 66,150 Z"
            fill="#C4B5FD" opacity="0.6" stroke="#A78BFA" stroke-width="3.5" stroke-linejoin="round"/>
      <!-- Rear flap -->
      <path d="M 42,24 L 132,96 L 66,150 Z"
            fill="#7C3AED" opacity="0.45" stroke="#A78BFA" stroke-width="3.5" stroke-linejoin="round"/>
    </g>

    <!-- Dense diagonal hatch over lower fold (matches reference image) -->
    <path d="M 162,30 L 132,96 L 66,150 Z" fill="url(#hatch)"/>

    <!-- Fold crease line -->
    <line x1="162" y1="30" x2="132" y2="96"
          stroke="#C4B5FD" stroke-width="2.5" opacity="0.9"/>

    <!--
      Dashed loop trail — one continuous path.
      Exits from near tail (66,150), sweeps lower-left,
      makes a full loop (path crosses itself ≈ circle at 40,168),
      then continues to lower-left corner.
    -->
    <path d="M 68,146
             C 60,154 52,156 46,163
             C 40,170 30,170 28,178
             C 26,186 32,192 40,190
             C 48,188 52,180 48,172
             C 44,164 34,164 28,172
             C 22,180 14,184 4,186"
          stroke="#A78BFA" stroke-width="2.8" stroke-dasharray="6,7"
          fill="none" opacity="0.65" stroke-linecap="round"/>
  </g>
</svg>

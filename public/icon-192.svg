<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="60%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Hatch lines for lower fold, running parallel to fold crease direction -->
    <pattern id="hatch" width="6" height="6"
             patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#A78BFA" stroke-width="1" opacity="0.55"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#1E0048" flood-opacity="0.4"/>
    </filter>
    <clipPath id="clip">
      <rect width="192" height="192" rx="44"/>
    </clipPath>
  </defs>

  <rect width="192" height="192" rx="44" fill="url(#bg)"/>
  <rect width="192" height="96"  rx="44" fill="url(#shine)"/>

  <g clip-path="url(#clip)">
    <g filter="url(#shadow)">
      <!-- Upper wing (white, large face) — scaled 6× from 32×32 -->
      <path d="M 168,30 L 24,72 L 108,114 Z"
            fill="white" stroke="#A78BFA" stroke-width="3" stroke-linejoin="round"/>
      <!-- Lower fold base fill -->
      <path d="M 168,30 L 108,114 L 48,156 Z"
            fill="#EDE9FE" stroke="#A78BFA" stroke-width="3" stroke-linejoin="round"/>
      <!-- Rear flap -->
      <path d="M 24,72 L 108,114 L 48,156 Z"
            fill="#C4B5FD" stroke="#A78BFA" stroke-width="3" stroke-linejoin="round"/>
    </g>

    <!-- Hatch overlay on lower fold only -->
    <path d="M 168,30 L 108,114 L 48,156 Z" fill="url(#hatch)" opacity="0.7"/>

    <!-- Fold crease line (nose → fold junction) -->
    <line x1="168" y1="30" x2="108" y2="114"
          stroke="#A78BFA" stroke-width="2" opacity="0.55"/>

    <!-- Dashed trail: sweeps from tail, loops, exits lower-left -->
    <path d="M 50,152
             C 42,160 36,160 32,168
             C 28,176 32,186 40,182
             C 48,178 44,167 36,169
             C 28,171 20,181 10,184"
          stroke="#A78BFA" stroke-width="2.5" stroke-dasharray="6,7"
          fill="none" opacity="0.55" stroke-linecap="round"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="60%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Dense diagonal hatch for lower fold (matches reference hatching direction) -->
    <pattern id="hatch" width="5" height="5"
             patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="5"
            stroke="#A78BFA" stroke-width="1" opacity="0.65"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#1E0048" flood-opacity="0.4"/>
    </filter>
    <clipPath id="clip">
      <rect width="192" height="192" rx="44"/>
    </clipPath>
  </defs>

  <rect width="192" height="192" rx="44" fill="url(#bg)"/>
  <rect width="192" height="96"  rx="44" fill="url(#shine)"/>

  <g clip-path="url(#clip)">
    <!-- Plane — vertices scaled 6× from 32×32 design:
         N=(162,24)  TL=(48,60)  B=(120,102)  T=(78,132) -->
    <g filter="url(#shadow)">
      <!-- Upper wing (white) -->
      <path d="M 162,24 L 48,60 L 120,102 Z"
            fill="white" stroke="#A78BFA" stroke-width="3.5" stroke-linejoin="round"/>
      <!-- Lower fold (light lavender base) -->
      <path d="M 162,24 L 120,102 L 78,132 Z"
            fill="#EDE9FE" stroke="#A78BFA" stroke-width="3.5" stroke-linejoin="round"/>
      <!-- Rear flap -->
      <path d="M 48,60 L 120,102 L 78,132 Z"
            fill="#C4B5FD" stroke="#A78BFA" stroke-width="3.5" stroke-linejoin="round"/>
    </g>
    <!-- Hatch overlay on lower fold only -->
    <path d="M 162,24 L 120,102 L 78,132 Z" fill="url(#hatch)"/>
    <!-- Fold crease line -->
    <line x1="162" y1="24" x2="120" y2="102"
          stroke="#A78BFA" stroke-width="2" opacity="0.65"/>

    <!-- Dashed trail: curves from tail, loops, exits lower-left -->
    <path d="M 80,130
             C 72,136 62,134 55,141
             C 48,148 36,148 34,157
             C 32,166 38,173 47,171
             C 56,169 59,160 53,154
             C 47,148 38,150 34,157
             C 30,164 22,172 10,176"
          stroke="#A78BFA" stroke-width="2.8" stroke-dasharray="6,7"
          fill="none" opacity="0.6" stroke-linecap="round"/>
  </g>
</svg>

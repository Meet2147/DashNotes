<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="60%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Diagonal hatch pattern for lower fold -->
    <pattern id="hatch" width="10" height="10"
             patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10"
            stroke="#A78BFA" stroke-width="1.3" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#1E0048" flood-opacity="0.4"/>
    </filter>
    <!-- Clip to rounded background shape -->
    <clipPath id="clip">
      <rect width="192" height="192" rx="44"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="44" fill="url(#bg)"/>
  <rect width="192" height="96"  rx="44" fill="url(#shine)"/>

  <!-- Plane + trail clipped to rounded rect -->
  <g clip-path="url(#clip)">

    <!-- Plane with drop shadow -->
    <g filter="url(#shadow)">
      <!-- Upper wing -->
      <path d="M 162,30 L 24,78 L 96,120 Z"
            fill="white" stroke="#A78BFA" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Lower fold base -->
      <path d="M 162,30 L 96,120 L 42,162 Z"
            fill="#DDD6FE" stroke="#A78BFA" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Rear flap -->
      <path d="M 24,78 L 96,120 L 42,162 Z"
            fill="#C4B5FD" opacity="0.85" stroke="#A78BFA" stroke-width="2.5" stroke-linejoin="round"/>
    </g>

    <!-- Hatch overlay on lower fold (drawn above shadow group to stay crisp) -->
    <path d="M 162,30 L 96,120 L 42,162 Z" fill="url(#hatch)" opacity="0.55"/>

    <!-- Dashed flight trail -->
    <path d="M 42,156 Q 18,172 26,184 Q 34,192 14,190"
          stroke="#A78BFA" stroke-width="2.5" stroke-dasharray="5,6"
          fill="none" opacity="0.45" stroke-linecap="round"/>
  </g>
</svg>

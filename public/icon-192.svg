<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="60%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#1E0048" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="44" fill="url(#bg)"/>
  <!-- Top shine -->
  <rect width="192" height="96" rx="44" fill="url(#shine)"/>

  <!-- Paper plane (scaled 6x from 32x32: nose→168,78 top→18,18 fold→54,78 bottom→18,138) -->
  <g filter="url(#shadow)">
    <!-- Top wing -->
    <path d="M 168,78 L 18,18 L 54,78 Z" fill="white"/>
    <!-- Bottom wing (slightly dimmer) -->
    <path d="M 168,78 L 54,78 L 18,138 Z" fill="white" opacity="0.88"/>
    <!-- Lower fold flap -->
    <path d="M 54,78 L 66,114 L 18,138 Z" fill="#C4B5FD" opacity="0.75"/>
  </g>

  <!-- Accent sparkle dots (trailing effect) -->
  <circle cx="148" cy="128" r="4"   fill="#A78BFA" opacity="0.6"/>
  <circle cx="162" cy="142" r="2.5" fill="#C4B5FD" opacity="0.45"/>
  <circle cx="136" cy="148" r="2"   fill="#DDD6FE" opacity="0.35"/>
</svg>

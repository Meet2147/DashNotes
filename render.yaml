services:
  - type: web
    name: dashnotes
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && node_modules/.bin/prisma generate && npm run build
    startCommand: sh start.sh
    envVars:
      - key: NODE_VERSION
        value: 22.22.2
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: 0.0.0.0
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: dashnotes-db
          property: connectionString
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: dashnotes
          property: host

databases:
  - name: dashnotes-db
    region: oregon
    plan: free
